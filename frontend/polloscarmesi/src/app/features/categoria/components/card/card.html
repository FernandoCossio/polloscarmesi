<div class="category-card relative flex flex-col items-center justify-center p-6 bg-surface-0 dark:bg-surface-900 border border-surface-200 dark:border-surface-800 rounded-2xl transition-all duration-300 hover:shadow-md cursor-pointer">
    <!-- Action buttons -->
    <div class="absolute top-3 right-3 flex gap-2 action-buttons">
        <button 
            pButton 
            type="button" 
            icon="pi pi-pencil" 
            class="p-button-text p-button-rounded p-button-sm edit-btn" 
            (click)="onEdit($event)"
            title="Editar"
        ></button>
        <button 
            pButton 
            type="button" 
            icon="pi pi-trash" 
            class="p-button-text p-button-rounded p-button-danger p-button-sm delete-btn" 
            (click)="onDelete($event)"
            title="Eliminar"
        ></button>
    </div>

    <!-- Icon Container -->
    <div class="icon-container flex items-center justify-center w-16 h-16 rounded-full mb-4 transition-transform duration-300">
        <span class="material-symbols-outlined text-3xl">
            {{ categoria.icon || 'restaurant' }}
        </span>
    </div>

    <!-- Title -->
    <h3 class="text-xl font-bold text-center mb-1 text-surface-900 dark:text-surface-0">
        {{ categoria.nombre }}
    </h3>

    <!-- Description -->
    <p class="text-sm text-center text-surface-500 dark:text-surface-400 mb-3 px-2 line-clamp-2 h-10">
        {{ categoria.descripcion || 'Sin descripción' }}
    </p>

    <!-- Status Badge -->
    <span class="status-badge px-3 py-1 text-xs font-semibold rounded-full bg-primary-50 dark:bg-primary-950 text-primary-600 dark:text-primary-300">
        Categoría Activa
    </span>
</div>
