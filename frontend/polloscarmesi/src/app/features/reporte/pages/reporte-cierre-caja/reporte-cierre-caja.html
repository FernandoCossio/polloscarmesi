  <app-header-reporte-cierre></app-header-reporte-cierre>

    (buscar)="onBuscar($event)" 
    (exportExcel)="exportarExcel($event)" 
    (exportPdf)="exportarPdf($event)">

  <app-stats-reporte-cierre 
    [data]="reportData()">
  </app-stats-reporte-cierre>

  <app-contenido-reporte-cierre

    [cargado]="cargado()">
  </app-contenido-reporte-cierre>
</div>
