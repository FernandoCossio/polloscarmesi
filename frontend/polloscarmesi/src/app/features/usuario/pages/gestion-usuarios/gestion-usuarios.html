<div class="card flex flex-col p-6 bg-surface-0 dark:bg-surface-900 border border-surface-200 dark:border-surface-800 rounded-3xl shadow-sm">
  <!-- Header Component -->
  <app-header-gestion-usuarios></app-header-gestion-usuarios>

  <!-- Filter Component -->
  <app-filtro-gestion-usuarios 
    (searchChange)="onSearch($event)" 
    (roleChange)="onRoleFilterChange($event)"
    (newUsuarioClick)="onNewUsuario()">
  </app-filtro-gestion-usuarios>

  <!-- User Card List -->
  <div class="flex-1 flex flex-col gap-4 mb-6">
    @for (usuario of paginatedUsuarios(); track usuario.uuid) {
      <app-card-usuario 
        [usuario]="usuario" 
        (edit)="onEdit($event)"
        (toggleStatus)="onToggleStatus($event)">
      </app-card-usuario>
    } @empty {
      <div class="flex-1 flex flex-col items-center justify-center py-12 text-surface-500 dark:text-surface-400 border border-dashed border-surface-200 dark:border-surface-800 rounded-2xl">
        <i class="pi pi-inbox text-4xl mb-3 text-surface-300"></i>
        <p class="m-0 font-medium text-lg">No se encontraron usuarios de personal.</p>
      </div>
    }
  </div>

  <!-- Paginator Footer -->
  <div class="border-t border-surface-200 dark:border-surface-800 pt-4 flex flex-col sm:flex-row justify-between items-center gap-4">
    <span class="text-sm font-medium text-surface-500 dark:text-surface-400">
      Mostrando {{ getStartIndex() }} a {{ getEndIndex() }} de {{ filteredUsuarios().length }} usuarios
    </span>
    <p-paginator 
      [rows]="rows()" 
      [totalRecords]="filteredUsuarios().length" 
      [first]="first()"
      (onPageChange)="onPageChange($event)"
      [showFirstLastIcon]="false">
    </p-paginator>
  </div>
</div>

<!-- User Form Dialog -->
<app-form-usuario 
  [(visible)]="formVisible" 
  [usuario]="selectedUsuario()"
  (save)="onSave($event)">
</app-form-usuario>

<!-- Notifications & Confirm Dialog -->
<p-toast></p-toast>
<p-confirmdialog></p-confirmdialog>
