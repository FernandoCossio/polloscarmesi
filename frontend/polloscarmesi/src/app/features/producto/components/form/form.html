<!-- Main Product Dialog Form -->
<p-dialog 
    [header]="producto ? 'Editar Producto' : 'Nuevo Producto'" 
    [(visible)]="visible" 
    [modal]="true" 
    [closable]="true"
    [style]="{ width: '450px' }"
    [draggable]="false"
    [resizable]="false"
    (onHide)="close()">
    
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 mt-2">
        <!-- Nombre -->
        <div class="flex flex-col gap-2">
            <label for="nombre" class="font-semibold text-surface-700 dark:text-surface-300">Nombre *</label>
            <input 
                pInputText 
                id="nombre" 
                formControlName="nombre" 
                placeholder="Ej. Hamburguesa con Queso" 
                class="w-full"
                [class.ng-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched"
                [class.ng-dirty]="form.get('nombre')?.invalid && form.get('nombre')?.touched"
            />
            <small *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched" class="text-red-500">
                El nombre es obligatorio y debe tener al menos 3 caracteres.
            </small>
        </div>

        <!-- Descripción -->
        <div class="flex flex-col gap-2">
            <label for="descripcion" class="font-semibold text-surface-700 dark:text-surface-300">Descripción</label>
            <textarea 
                pTextarea 
                id="descripcion" 
                formControlName="descripcion" 
                rows="3" 
                placeholder="Describa los ingredientes o detalles del plato..." 
                class="w-full resize-none"
            ></textarea>
        </div>

        <!-- Precio -->
        <div class="flex flex-col gap-2">
            <label for="precio" class="font-semibold text-surface-700 dark:text-surface-300">Precio *</label>
            <input 
                pInputText 
                type="number"
                step="0.01"
                id="precio" 
                formControlName="precio" 
                placeholder="Ej. 12.50" 
                class="w-full"
                [class.ng-invalid]="form.get('precio')?.invalid && form.get('precio')?.touched"
                [class.ng-dirty]="form.get('precio')?.invalid && form.get('precio')?.touched"
            />
            <small *ngIf="form.get('precio')?.invalid && form.get('precio')?.touched" class="text-red-500">
                El precio es obligatorio y debe ser mayor que 0.
            </small>
        </div>

        <!-- Categoría (Selector + Inline Add Button) -->
        <div class="flex flex-col gap-2">
            <label for="categoriaId" class="font-semibold text-surface-700 dark:text-surface-300">Categoría *</label>
            <div class="flex gap-2">
                <p-select 
                    id="categoriaId"
                    formControlName="categoriaId" 
                    [options]="categorias || []" 
                    optionLabel="nombre" 
                    optionValue="id"
                    class="flex-1"
                    placeholder="Seleccione una categoría"
                    appendTo="body">
                    <ng-template #selectedItem let-selectedOption>
                        <div class="flex items-center gap-2" *ngIf="selectedOption">
                            <span class="material-symbols-outlined text-xl" *ngIf="selectedOption.icon">{{ selectedOption.icon }}</span>
                            <span class="font-medium">{{ selectedOption.nombre }}</span>
                        </div>
                    </ng-template>
                    <ng-template #item let-option>
                        <div class="flex items-center gap-2 py-1">
                            <span class="material-symbols-outlined text-xl" *ngIf="option.icon">{{ option.icon }}</span>
                            <span>{{ option.nombre }}</span>
                        </div>
                    </ng-template>
                </p-select>
                <button 
                    pButton 
                    type="button" 
                    icon="pi pi-plus" 
                    class="p-button-outlined shrink-0" 
                    (click)="openNewCategoryDialog()"
                    title="Nueva Categoría">
                </button>
            </div>
            <small *ngIf="form.get('categoriaId')?.invalid && form.get('categoriaId')?.touched" class="text-red-500">
                Debe seleccionar una categoría.
            </small>
        </div>

        <!-- Form Actions -->
        <div class="flex justify-end gap-2 mt-4">
            <button 
                pButton 
                type="button" 
                label="Cancelar" 
                class="p-button-text p-button-secondary" 
                (click)="close()">
            </button>
            <button 
                pButton 
                type="submit" 
                label="Guardar" 
                [disabled]="form.invalid" 
                class="p-button-primary">
            </button>
        </div>
    </form>
</p-dialog>

<!-- Nested Category Creation Dialog -->
<p-dialog 
    header="Nueva Categoría" 
    [(visible)]="catDialogVisible" 
    [modal]="true" 
    [closable]="true"
    [style]="{ width: '400px' }"
    [draggable]="false"
    [resizable]="false"
    appendTo="body">
    
    <form [formGroup]="catForm" (ngSubmit)="saveCategory()" class="flex flex-col gap-4 mt-2">
        <div class="flex flex-col gap-2">
            <label for="catNombre" class="font-semibold text-surface-700 dark:text-surface-300">Nombre *</label>
            <input 
                pInputText 
                id="catNombre" 
                formControlName="nombre" 
                placeholder="Ej. Postres" 
                class="w-full"
            />
        </div>

        <div class="flex flex-col gap-2">
            <label for="catDescripcion" class="font-semibold text-surface-700 dark:text-surface-300">Descripción</label>
            <textarea 
                pTextarea 
                id="catDescripcion" 
                formControlName="descripcion" 
                rows="2" 
                placeholder="Describa la categoría..." 
                class="w-full resize-none"
            ></textarea>
        </div>

        <div class="flex flex-col gap-2">
            <label class="font-semibold text-surface-700 dark:text-surface-300">Ícono representativo</label>
            <div class="flex flex-wrap gap-2 p-3 bg-surface-50 dark:bg-surface-950 rounded-xl border border-surface-200 dark:border-surface-800 max-h-32 overflow-y-auto">
                <button 
                    *ngFor="let icon of catPresetIcons" 
                    type="button" 
                    class="icon-btn"
                    [class.active]="catForm.get('icon')?.value === icon"
                    (click)="selectCatIcon(icon)"
                    [title]="icon">
                    <span class="material-symbols-outlined text-xl">{{ icon }}</span>
                </button>
            </div>
        </div>

        <div class="flex justify-end gap-2 mt-2">
            <button 
                pButton 
                type="button" 
                label="Cancelar" 
                class="p-button-text p-button-secondary" 
                (click)="catDialogVisible = false">
            </button>
            <button 
                pButton 
                type="submit" 
                label="Crear" 
                [disabled]="catForm.invalid" 
                class="p-button-primary">
            </button>
        </div>
    </form>
</p-dialog>
