<div class="product-card-row relative flex items-center justify-between p-4 bg-surface-0 dark:bg-surface-900 border border-surface-200 dark:border-surface-800 rounded-2xl transition-all duration-300 hover:shadow-sm">
    <!-- Action buttons -->
    <div class="absolute top-3 right-3 flex gap-2 action-buttons">
        <button 
            pButton 
            type="button" 
            icon="pi pi-pencil" 
            class="p-button-text p-button-rounded p-button-sm edit-btn" 
            (click)="onEdit($event)"
            title="Editar">
        </button>
        <button 
            pButton 
            type="button" 
            icon="pi pi-trash" 
            class="p-button-text p-button-rounded p-button-danger p-button-sm delete-btn" 
            (click)="onDelete($event)"
            title="Eliminar">
        </button>
    </div>

    <!-- Content Layout -->
    <div class="flex items-center gap-4 flex-1 min-w-0">
        <!-- Thumbnail / Image -->
        <div class="thumbnail-container flex items-center justify-center w-20 h-20 rounded-xl overflow-hidden shrink-0 border border-surface-200 dark:border-surface-800 bg-surface-50 dark:bg-surface-950 transition-all duration-300 relative group cursor-pointer"
             (click)="onImageClick($event)"
             title="Subir/Cambiar Imagen">
            @if (producto.imagenUrl) {
                <img [src]="producto.imagenUrl" alt="imagen" class="w-full h-full object-cover">
            } @else {
                <span class="material-symbols-outlined text-4xl">
                    {{ producto.categoria?.icon || 'restaurant' }}
                </span>
            }
            <!-- Hover camera overlay -->
            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity duration-200 text-white">
                <i class="pi pi-camera text-xl"></i>
            </div>
        </div>

        <!-- Details -->
        <div class="flex flex-col gap-1 min-w-0 pr-4">
            <h4 class="text-lg font-bold text-surface-900 dark:text-surface-0 m-0 truncate">
                {{ producto.nombre }}
            </h4>
            <p class="text-sm text-surface-500 dark:text-surface-400 m-0 line-clamp-2">
                {{ producto.descripcion || 'Sin descripción' }}
            </p>
            <div class="flex items-center gap-2 mt-1">
                <span class="category-badge px-3 py-0.5 text-xs font-semibold rounded-full bg-surface-100 dark:bg-surface-800 text-surface-600 dark:text-surface-300">
                    {{ producto.categoria?.nombre || 'General' }}
                </span>
            </div>
        </div>
    </div>

    <!-- Right Side (Price & Status) -->
    <div class="flex flex-col items-end gap-3 pl-4 shrink-0 justify-center">
        <span class="text-xl font-bold text-surface-900 dark:text-surface-0">
            ${{ producto.precio.toFixed(2) }}
        </span>
        <button 
            type="button"
            class="status-toggle-pill px-4 py-1 text-sm font-semibold rounded-full border transition-all duration-200 flex items-center cursor-pointer"
            [class.status-active]="producto.disponible"
            [class.status-inactive]="!producto.disponible"
            (click)="onToggleAvailability($event)">
            <span class="status-indicator-dot"></span>
            {{ producto.disponible ? 'Disponible' : 'No disponible' }}
        </button>
    </div>
</div>
