<div class="card flex flex-col p-6 bg-surface-0 dark:bg-surface-900 border border-surface-200 dark:border-surface-800 rounded-3xl shadow-sm">
    <!-- Header Component -->
    <app-producto-header></app-producto-header>

    <!-- Filter Component -->
    <app-producto-filter 
        [categorias]="categorias()"
        (searchChange)="onSearch($event)" 
        (categoriaChange)="onCategoryFilterChange($event)"
        (newProductClick)="onNewProduct()">
    </app-producto-filter>

    <!-- Product Grid/List -->
    <div class="flex-1 flex flex-col gap-4 mb-6">
        @for (producto of paginatedProductos(); track producto.id) {
            <app-producto-card 
                [producto]="producto" 
                (edit)="onEdit($event)"
                (delete)="onDelete($event)"
                (availabilityToggle)="onToggleAvailability($event)">
            </app-producto-card>
        } @empty {
            <div class="flex-1 flex flex-col items-center justify-center py-12 text-surface-500 dark:text-surface-400">
                <i class="pi pi-inbox text-4xl mb-3 text-surface-300"></i>
                <p class="m-0 font-medium text-lg">No se encontraron productos.</p>
            </div>
        }
    </div>

    <!-- Paginator Footer -->
    <div class="border-t border-surface-200 dark:border-surface-800 pt-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <span class="text-sm font-medium text-surface-500 dark:text-surface-400">
            Mostrando {{ getStartIndex() }} a {{ getEndIndex() }} de {{ filteredProductos().length }} productos
        </span>
        <p-paginator 
            [rows]="rows()" 
            [totalRecords]="filteredProductos().length" 
            [first]="first()"
            (onPageChange)="onPageChange($event)"
            [showFirstLastIcon]="false">
        </p-paginator>
    </div>
</div>

<!-- Product Form Dialog Component -->
<app-producto-form 
    [(visible)]="formVisible" 
    [producto]="selectedProducto()"
    [categorias]="categorias()"
    (save)="onSave($event)"
    (categoryCreated)="onCategoryCreated()">
</app-producto-form>

<!-- Dialog notifications support -->
<p-toast></p-toast>
<p-confirmdialog></p-confirmdialog>
