spring.application.name=auth

spring.profiles.active=dev
server.port=8081
server.servlet.context-path=/api
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.filter=true

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth_restaurante}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.issuer=restaurante
app.jwt.access-token-ttl=P1D
app.jwt.refresh-token-ttl=P7D
app.jwt.private-key=classpath:certs/private.pem
app.jwt.public-key=classpath:certs/public.pem
app.service-auth.clients=${APP_SERVICE_AUTH_CLIENTS:}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.base-url=http://localhost:8081/api
app.upload.dir=${APP_UPLOAD_DIR}
