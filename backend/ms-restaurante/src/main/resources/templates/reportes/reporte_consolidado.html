<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Reporte Consolidado de Ventas</title>
    <style>
        @page {
            size: A4 landscape;
            margin: 15mm;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 11px;
            color: #333;
            line-height: 1.4;
            margin: 0;
            padding: 0;
        }
        .header {
            margin-bottom: 20px;
            border-bottom: 2px solid #1a365d;
            padding-bottom: 10px;
        }
        .header h1 {
            font-size: 22px;
            color: #1a365d;
            margin: 0 0 5px 0;
        }
        .header p {
            margin: 0;
            color: #555;
            font-size: 12px;
        }
        .meta-box {
            background-color: #f7fafc;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .meta-box table {
            width: 100%;
        }
        .meta-box td {
            padding: 3px 10px;
            font-size: 11px;
        }
        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .report-table th {
            background-color: #2b6cb0;
            color: #fff;
            text-align: left;
            padding: 8px 10px;
            font-weight: bold;
            border: 1px solid #2b6cb0;
        }
        .report-table td {
            padding: 8px 10px;
            border: 1px solid #e2e8f0;
        }
        .report-table tr:nth-child(even) {
            background-color: #f7fafc;
        }
        .right {
            text-align: right;
        }
        .center {
            text-align: center;
        }
        .total-row {
            font-weight: bold;
            background-color: #edf2f7 !important;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pollos Carmesí</h1>
        <p>Reporte Consolidado de Ventas y Pagos</p>
    </div>

    <div class="meta-box">
        <table>
            <tr>
                <td style="width: 15%;"><strong>Filtro Rango:</strong></td>
                <td><span th:text="${fechaInicio} + ' al ' + ${fechaFin}">01/01/2026 al 15/01/2026</span></td>
                <td style="width: 15%;"><strong>Generado el:</strong></td>
                <td class="right"><span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm:ss')}">09/06/2026</span></td>
            </tr>
        </table>
    </div>

    <table class="report-table">
        <thead>
            <tr>
                <th style="width: 10%;">ID Pago</th>
                <th style="width: 20%;">Fecha</th>
                <th style="width: 15%;" class="center">Tipo Pedido</th>
                <th style="width: 15%;" class="center">Método Pago</th>
                <th style="width: 15%;" class="center">Estado Pago</th>
                <th style="width: 15%;" class="right">Monto Total</th>
                <th style="width: 10%;" class="center">Ficha</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="pago : ${pagos}">
                <td th:text="${pago.id}">1</td>
                <td th:text="${#temporals.format(pago.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2026-06-09 11:35:50</td>
                <td class="center" th:text="${pago.pedido.tipo}">PRESENCIAL</td>
                <td class="center" th:text="${pago.metodo}">EFECTIVO</td>
                <td class="center" th:text="${pago.estado}">ACEPTADO</td>
                <td class="right" th:text="${'$' + #numbers.formatDecimal(pago.montoTotal, 1, 2)}">$22.50</td>
                <td class="center" th:text="${pago.pedido.numeroFicha != null ? pago.pedido.numeroFicha : '-'}">A-45</td>
            </tr>
            <tr class="total-row">
                <td colspan="5" class="right">TOTAL ACUMULADO:</td>
                <td class="right" style="color: #2b6cb0;" th:text="${'$' + #numbers.formatDecimal(totalAcumulado, 1, 2)}">$1000.00</td>
                <td></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
