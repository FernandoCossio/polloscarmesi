spring.application.name=restaurante

spring.profiles.active=dev
server.port=8082
server.servlet.context-path=/api
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.filter=true
spring.graphql.graphiql.enabled=true

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/restaurante}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.public-key=classpath:certs/public.pem
app.internal-auth.base-url=${AUTH_BASE_URL:http://localhost:8081/api}
app.internal-auth.client-id=${INTERNAL_AUTH_CLIENT_ID:ms-restaurante}
app.internal-auth.client-secret=${INTERNAL_AUTH_CLIENT_SECRET:}
app.internal-auth.cache-skew-seconds=${INTERNAL_AUTH_CACHE_SKEW_SECONDS:60}
app.ms-ia.base-url=${MS_IA_BASE_URL:http://localhost:8003/api}

app.storage.type=${APP_STORAGE_TYPE:s3}

aws.s3.access-key=${AWS_S3_ACCESS_KEY}
aws.s3.secret-key=${AWS_S3_SECRET_KEY}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.endpoint=${AWS_S3_ENDPOINT:}
 
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

